services:
  postgres:
    image: postgres:16-alpine
    container_name: cds-postgres
    environment:
      POSTGRES_USER: cds
      POSTGRES_PASSWORD: cds_secret
      POSTGRES_DB: cyber_defense
    ports:
      - "5432:5432"
    volumes:
      - cds_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cds -d cyber_defense"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  cds_pg_data:
