# Render.com — FastAPI backend + PostgreSQL
# Frontend: build locally or via static site service pointing to frontend/dist

services:
  - type: web
    name: cyber-defense-api
    runtime: python
    plan: free
    rootDir: .
    buildCommand: pip install -r requirements.txt && cd frontend && npm ci && npm run build
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: CDS_BIND_HOST
        value: "0.0.0.0"
      - key: CDS_SECRET_KEY
        generateValue: true
      - key: CDS_DATABASE_URL
        fromDatabase:
          name: cyber-defense-db
          property: connectionString
      - key: CDS_ADMIN_USER
        value: admin
      - key: CDS_ADMIN_PASSWORD
        generateValue: true
      - key: CDS_ANALYST_USER
        value: analyst
      - key: CDS_ANALYST_PASSWORD
        generateValue: true
      - key: CDS_VIEWER_USER
        value: viewer
      - key: CDS_VIEWER_PASSWORD
        generateValue: true
      - key: CDS_CORS_ORIGINS
        sync: false
      - key: CDS_FIREWALL_ENABLED
        value: "false"

databases:
  - name: cyber-defense-db
    plan: free
    databaseName: cyber_defense
    user: cds
