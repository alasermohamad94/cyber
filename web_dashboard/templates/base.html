<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Cyber Defense System{% endblock %}</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Socket.IO -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.js"></script>
    
    <!-- Forest Theme CSS -->
    <link href="{{ url_for('static', filename='css/forest_theme.css') }}" rel="stylesheet">
    
    <style>
        /* Override Bootstrap with forest theme */
        .navbar {
            background: rgba(0, 38, 35, 0.95) !important;
            backdrop-filter: blur(10px);
            border-bottom: 2px solid #4a151e;
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.1);
        }

        .navbar-brand {
            font-weight: bold;
            color: #b9a779 !important;
            font-size: 1.5rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, #002623 0%, #054239 100%);
            border: none;
            color: #ffffff;
        }

        .btn-success {
            background: linear-gradient(135deg, #988561 0%, #6b1f2a 100%);
            border: none;
            color: #ffffff;
        }

        .btn-warning {
            background: linear-gradient(135deg, #b9a779 0%, #988561 100%);
            border: none;
            color: #002623;
        }

        .btn-danger {
            background: linear-gradient(135deg, #4a151e 0%, #260f14 100%);
            border: none;
            color: #ffffff;
        }

        .alert-success {
            background: rgba(152, 133, 97, 0.1);
            border-left: 5px solid #988561;
            color: #002623;
        }

        .alert-warning {
            background: rgba(185, 167, 121, 0.1);
            border-left: 5px solid #b9a779;
            color: #002623;
        }

        .alert-danger {
            background: rgba(107, 31, 42, 0.1);
            border-left: 5px solid #6b1f2a;
            color: #ffffff;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            border: 1px solid #054239;
            box-shadow: 0 8px 32px rgba(0, 38, 35, 0.3);
        }

        .card-header {
            background: linear-gradient(135deg, #002623 0%, #054239 100%);
            color: #ffffff;
            border-bottom: 3px solid #4a151e;
        }

        .table {
            background: rgba(255, 255, 255, 0.95);
            color: #161616;
        }

        .table th {
            background: linear-gradient(135deg, #002623 0%, #054239 100%);
            color: #ffffff;
        }

        .status-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
        }

        .status-healthy {
            background: #988561;
            box-shadow: 0 0 10px #988561;
        }

        .status-warning {
            background: #b9a779;
            box-shadow: 0 0 10px #b9a779;
        }

        .status-critical {
            background: #4a151e;
            box-shadow: 0 0 10px #4a151e;
        }

        .nav-link {
            color: #fff !important;
            transition: all 0.3s ease;
            border-radius: 5px;
            margin: 0 5px;
        }

        .nav-link:hover, .nav-link.active {
            background: var(--accent-color);
            transform: translateY(-2px);
        }

        .main-container {
            padding: 20px;
            min-height: calc(100vh - 76px);
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: none;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(0,0,0,0.15);
        }

        .card-header {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            border-radius: 15px 15px 0 0 !important;
            font-weight: bold;
            border: none;
        }

        .metric-card {
            text-align: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        .metric-value {
            font-size: 2.5rem;
            font-weight: bold;
            color: var(--primary-color);
            margin: 10px 0;
        }

        .metric-label {
            color: #6c757d;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
            animation: pulse 2s infinite;
        }

        .status-online { background: var(--success-color); }
        .status-warning { background: var(--warning-color); }
        .status-danger { background: var(--danger-color); }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        .progress {
            height: 8px;
            border-radius: 4px;
            background: #e9ecef;
        }

        .progress-bar {
            border-radius: 4px;
            transition: width 0.6s ease;
        }

        .alert {
            border: none;
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }

        .btn {
            border-radius: 8px;
            font-weight: 500;
            transition: all 0.3s ease;
            border: none;
        }

        .btn-primary {
            background: var(--accent-color);
            border-color: var(--accent-color);
        }

        .btn-primary:hover {
            background: #d63850;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(233, 69, 96, 0.3);
        }

        .table {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 10px;
            overflow: hidden;
        }

        .table thead {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid var(--accent-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .chart-container {
            position: relative;
            height: 300px;
            margin: 20px 0;
        }

        .security-event {
            border-left: 4px solid;
            padding: 10px;
            margin: 5px 0;
            border-radius: 5px;
            background: rgba(255, 255, 255, 0.9);
        }

        .security-event.low { border-left-color: var(--info-color); }
        .security-event.medium { border-left-color: var(--warning-color); }
        .security-event.high { border-left-color: var(--danger-color); }
        .security-event.critical { border-left-color: #721c24; }

        .connection-status {
            position: fixed;
            top: 80px;
            right: 20px;
            z-index: 1000;
            padding: 10px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .connection-status.connected {
            background: var(--success-color);
            color: white;
        }

        .connection-status.disconnected {
            background: var(--danger-color);
            color: white;
        }

        .entity-analysis-form {
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            border-radius: 15px;
            margin: 20px 0;
        }

        .form-control, .form-select {
            border-radius: 8px;
            border: 2px solid #e9ecef;
            transition: border-color 0.3s ease;
        }

        .form-control:focus, .form-select:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 0.2rem rgba(233, 69, 96, 0.25);
        }

        .sidebar {
            background: rgba(26, 26, 46, 0.95);
            min-height: calc(100vh - 76px);
            border-radius: 0 15px 15px 0;
            padding: 20px;
        }

        .sidebar .nav-link {
            color: #fff !important;
            padding: 12px 20px;
            margin: 5px 0;
            border-radius: 10px;
            transition: all 0.3s ease;
        }

        .sidebar .nav-link:hover {
            background: var(--accent-color);
            transform: translateX(5px);
        }

        .sidebar .nav-link.active {
            background: var(--accent-color);
            box-shadow: 0 4px 15px rgba(233, 69, 96, 0.3);
        }

        @media (max-width: 768px) {
            .sidebar {
                min-height: auto;
                margin-bottom: 20px;
            }
            
            .metric-value {
                font-size: 2rem;
            }
            
            .main-container {
                padding: 10px;
            }
        }

        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="{{ url_for('index') }}">
                <i class="fas fa-shield-alt"></i> Cyber Defense System
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'index' %}active{% endif %}" href="{{ url_for('index') }}">
                            <i class="fas fa-tachometer-alt"></i> Dashboard
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'analytics' %}active{% endif %}" href="{{ url_for('analytics') }}">
                            <i class="fas fa-chart-line"></i> Analytics
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'threat_management' %}active{% endif %}" href="{{ url_for('threat_management') }}">
                            <i class="fas fa-shield-virus"></i> Threat Management
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'settings' %}active{% endif %}" href="{{ url_for('settings') }}">
                            <i class="fas fa-cog"></i> Settings
                        </a>
                    </li>
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <span class="navbar-text">
                            <span class="status-indicator status-online"></span>
                            <span id="connection-status">Connected</span>
                        </span>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Connection Status Indicator -->
    <div id="connection-indicator" class="connection-status connected">
        <i class="fas fa-wifi"></i> Live
    </div>

    <!-- Main Content -->
    <div class="container-fluid main-container">
        {% block content %}{% endblock %}
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Common JavaScript -->
    <script>
        // Initialize Socket.IO
        const socket = io();
        
        // Connection status
        socket.on('connect', function() {
            console.log('Connected to server');
            updateConnectionStatus(true);
        });
        
        socket.on('disconnect', function() {
            console.log('Disconnected from server');
            updateConnectionStatus(false);
        });
        
        function updateConnectionStatus(connected) {
            const indicator = document.getElementById('connection-indicator');
            const status = document.getElementById('connection-status');
            
            if (connected) {
                indicator.className = 'connection-status connected';
                indicator.innerHTML = '<i class="fas fa-wifi"></i> Live';
                status.textContent = 'Connected';
            } else {
                indicator.className = 'connection-status disconnected';
                indicator.innerHTML = '<i class="fas fa-wifi-slash"></i> Disconnected';
                status.textContent = 'Disconnected';
            }
        }
        
        // Utility functions
        function formatBytes(bytes) {
            const units = ['B', 'KB', 'MB', 'GB', 'TB'];
            let size = bytes;
            let unitIndex = 0;
            
            while (size >= 1024 && unitIndex < units.length - 1) {
                size /= 1024;
                unitIndex++;
            }
            
            return size.toFixed(1) + ' ' + units[unitIndex];
        }
        
        function formatDuration(seconds) {
            const days = Math.floor(seconds / 86400);
            const hours = Math.floor((seconds % 86400) / 3600);
            const minutes = Math.floor((seconds % 3600) / 60);
            const secs = Math.floor(seconds % 60);
            
            if (days > 0) return `${days}d ${hours}h ${minutes}m`;
            if (hours > 0) return `${hours}h ${minutes}m ${secs}s`;
            if (minutes > 0) return `${minutes}m ${secs}s`;
            return `${secs}s`;
        }
        
        function getSeverityColor(severity) {
            const colors = {
                'low': '#17a2b8',
                'medium': '#f4b942',
                'high': '#dc3545',
                'critical': '#721c24'
            };
            return colors[severity] || '#6c757d';
        }
        
        function showNotification(message, type = 'info') {
            const alertDiv = document.createElement('div');
            alertDiv.className = `alert alert-${type} alert-dismissible fade show position-fixed`;
            alertDiv.style.cssText = 'top: 100px; right: 20px; z-index: 9999; min-width: 300px;';
            alertDiv.innerHTML = `
                ${message}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            `;
            document.body.appendChild(alertDiv);
            
            setTimeout(() => {
                alertDiv.remove();
            }, 5000);
        }

        function setElementText(id, value, fallback = 'N/A') {
            const element = document.getElementById(id);
            if (!element) return;
            element.textContent = value === null || value === undefined || value === '' ? fallback : value;
        }

        function setLoading(containerId, message = 'Loading data...') {
            const container = document.getElementById(containerId);
            if (!container) return;
            container.innerHTML = `
                <div class="text-center text-muted py-3">
                    <div class="loading-spinner"></div>
                    <p class="mt-2 mb-0">${message}</p>
                </div>
            `;
        }

        function setEmpty(containerId, message = 'No data available') {
            const container = document.getElementById(containerId);
            if (!container) return;
            container.innerHTML = `
                <div class="text-center text-muted py-3">
                    <i class="fas fa-circle-info fa-2x mb-2"></i>
                    <p class="mb-0">${message}</p>
                </div>
            `;
        }

        function setError(containerId, message = 'Unable to load data') {
            const container = document.getElementById(containerId);
            if (!container) return;
            container.innerHTML = `
                <div class="alert alert-warning mb-0">
                    <i class="fas fa-triangle-exclamation"></i> ${message}
                </div>
            `;
        }

        function safeFixed(value, digits = 1, fallback = 'N/A') {
            const number = Number(value);
            return Number.isFinite(number) ? number.toFixed(digits) : fallback;
        }
        
        // API helper
        async function fetchAPI(endpoint, options = {}) {
            try {
                const response = await fetch(`/api${endpoint}`, options);
                let payload = null;
                try {
                    payload = await response.json();
                } catch (parseError) {
                    payload = null;
                }
                if (!response.ok) {
                    throw new Error(payload?.error || `HTTP error! status: ${response.status}`);
                }
                return payload;
            } catch (error) {
                console.error('API Error:', error);
                showNotification(`API Error: ${error.message}`, 'danger');
                throw error;
            }
        }
    </script>
    
    {% block scripts %}{% endblock %}
</body>
</html>
