<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - Cyber Defense System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/forest_theme.css') }}" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/dashboard-ui.css') }}" rel="stylesheet">
</head>
<body class="login-page d-flex align-items-center min-vh-100">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow">
                    <div class="card-header text-center">
                        <h4 class="mb-0"><i class="fas fa-shield-alt"></i> Cyber Defense System</h4>
                    </div>
                    <div class="card-body">
                        {% if error %}
                        <div class="alert alert-danger">{{ error }}</div>
                        {% endif %}
                        <form method="post" action="{{ url_for('login') }}">
                            <div class="mb-3">
                                <label class="form-label">اسم المستخدم</label>
                                <input type="text" name="username" class="form-control" required autofocus>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">كلمة المرور</label>
                                <input type="password" name="password" class="form-control" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">دخول</button>
                        </form>
                        <p class="text-muted small mt-3 mb-0">
                            حسابات افتراضية: admin / analyst / viewer — غيّر كلمات المرور عبر CDS_*_PASSWORD في البيئة.
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
